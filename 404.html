<!doctype html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Page Not Found
  </title>
  <link href="favicon.ico?v=20260307" rel="icon" type="image/x-icon"/>
  <script>
   (() => {
      const parts = location.pathname.split("/").filter(Boolean);
      const base = location.hostname.endsWith(".github.io") && parts.length ? `/${parts[0]}/` : "/";
      location.replace(base + location.search + location.hash);
    })();
  </script>
 </head>
 <body>
  <p>
   Page not found. Continue to
   <a href="./">
    the portfolio site
   </a>
   .
  </p>
 </body>
</html>
